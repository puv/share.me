services:
  app:
    build: .
    container_name: shareme
    ports:
      - "3330:3000"
    volumes:
      - shareme_uploads:/app/uploads
      - shareme_config:/app/config
    environment:
      - ADMIN_USERNAME=root
      - ADMIN_PASSWORD=xg*!@Kf8o8d$
    restart: unless-stopped

volumes:
  shareme_uploads:
  shareme_config:
